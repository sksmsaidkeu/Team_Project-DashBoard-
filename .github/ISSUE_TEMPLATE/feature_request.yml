name: ✨ 기능 요청
description: 새로운 기능이나 개선 사항을 제안합니다.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하고 싶은 문제
      description: 어떤 불편함이나 문제가 있나요?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결 방법
      description: 어떻게 해결하면 좋을지 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 고려했던 다른 방법이 있다면 작성해주세요.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: 추가 정보
    validations:
      required: false
