name: 🐛 버그 리포트
description: 오류나 예상치 못한 동작을 신고합니다.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 문제가 발생했는지 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 문제를 재현할 수 있는 단계를 순서대로 작성해주세요.
      placeholder: |
        1. '...'로 이동
        2. '...' 클릭
        3. 오류 발생
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 예상 동작
      description: 원래 어떻게 동작해야 하는지 설명해주세요.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: 환경
      description: 브라우저, OS, 버전 등
      placeholder: 예) Chrome 126, Windows 11
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: 스크린샷 / 추가 정보
    validations:
      required: false
